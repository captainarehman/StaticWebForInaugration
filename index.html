<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Redirect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover; /* Fill screen while maintaining aspect ratio */
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline preload="auto">
    <source src="intro.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
</video>

<script>
/* ==========================
   USER SETTINGS
========================== */

const VIDEO_URL = "YOUR_VIDEO.mp4";
const REDIRECT_URL = "https://example.com";

/* ========================== */

const video = document.getElementById("video");

video.src = VIDEO_URL;

// Redirect ONLY after the video finishes.
video.addEventListener("ended", () => {
    window.location.href = REDIRECT_URL;
});

// Attempt autoplay (most browsers require muted videos)
video.play().catch(() => {
    console.log("Autoplay blocked. User interaction required.");
});
</script>

</body>
</html>
